<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Cash App | International Credit Union</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assest/css/cashapp.css" />
  </head>

  <body>
    <!-- ===== HEADER ===== -->

    <header class="page-header">
      <div class="container">
        <a href="wire.html" class="back-btn">← Back</a>

        <h2>Cash App Transfer</h2>
      </div>
    </header>

    <!-- ===== MAIN ===== -->

    <main class="cashapp-page">
      <div class="container">
        <div class="link-card">
          <img
            src="assest/images/cashapp.jpeg"
            class="cashapp-logo"
            alt="Cash App"
          />

          <h1>No Cash App Linked</h1>

          <p>
            You currently do not have a Cash App account connected to your
            International Credit Union profile.
          </p>

          <p class="small-text">
            Link your Cash App to start sending and receiving money.
          </p>

          <!-- Buttons -->

          <div class="action-buttons">
            <button class="cancel-btn" id="cancelBtn">Cancel</button>

            <button class="link-btn" id="linkBtn">Link Cash App</button>
          </div>
        </div>
      </div>
    </main>

    <script src="assest/js/cashapp.js"></script>
  </body>
</html>
