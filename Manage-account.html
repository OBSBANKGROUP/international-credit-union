<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Accounts | International Credit Union</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assest/css/Manage-account.css" />
    <script src="assest/js/theme.js"></script>
  </head>
  <body>
    <header class="ma-header">
      <div class="hc">
        <a href="dashboard.html" class="back-btn">&#8592; Back</a>
        <h2>Manage Accounts</h2>
      </div>
    </header>

    <div class="page-body">
      <div class="container">
        <!-- ── HERO ── -->
        <div class="total-hero">
          <div>
            <h4>Total Balance Across All Accounts</h4>
            <h1 id="totalBalance">$0.00</h1>
            <p id="memberName">Loading...</p>
            <div class="hero-meta">
              <div class="hero-meta-item">
                <span>Account Number</span>
                <strong id="heroAccNum">••••••</strong>
              </div>
              <div class="hero-meta-item">
                <span>Routing Number</span>
                <strong id="heroRouting">••••••</strong>
              </div>
              <div class="hero-meta-item">
                <span>Account Status</span>
                <strong>&#10003; Active</strong>
              </div>
            </div>
          </div>
          <div class="hero-actions">
            <a href="wire-transfer.html" class="hero-action-btn white"
              >Transfer Funds</a
            >
            <a href="settings.html" class="hero-action-btn light">Settings</a>
          </div>
        </div>

        <!-- ── SUMMARY PILLS ── -->
        <div class="accounts-summary" id="accountsPills"></div>

        <!-- ── PERSONAL ACCOUNTS ── -->
        <div class="section-label">Personal Accounts</div>
        <div class="accounts-grid" id="personalAccounts"></div>

        <!-- ── BUSINESS ACCOUNTS ── -->
        <div class="section-label">Business Accounts</div>
        <div class="accounts-grid" id="businessAccounts"></div>

        <!-- ── TRANSACTIONS ── -->
        <div class="txn-section">
          <div class="txn-header">
            <h3>Recent Transactions</h3>
            <a href="transaction.html">View All</a>
          </div>
          <div class="txn-filters">
            <button class="txn-filter-btn active" data-filter="all">All</button>
            <button class="txn-filter-btn" data-filter="checking">
              Checking
            </button>
            <button class="txn-filter-btn" data-filter="savings">
              Savings
            </button>
            <button class="txn-filter-btn" data-filter="business">
              Business
            </button>
          </div>
          <div id="txnList"><p class="empty-txn">No transactions yet.</p></div>
        </div>
      </div>
    </div>

    <script src="assest/js/db.js"></script>
    <script src="assest/js/icu-data.js"></script>
    <script src="assest/js/auth.js"></script>
    <script src="assest/js/Manage-account.js"></script>
  </body>
</html>
