<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Cards | International Credit Union</title>

    <link rel="stylesheet" href="assest/css/card.css" />
  </head>

  <body>
    <div class="cards-container">
      <h2>Your Debit Cards</h2>

      <div class="debit-card-section">
        <!-- CARD 1 -->

        <div class="card-box">
          <div class="card-balance" id="card1Balance">$0.00</div>

          <img src="assest/images/personalatm.jpeg" class="card-img" />
        </div>

        <!-- CARD 2 -->

        <div class="card-box">
          <div class="card-balance" id="card2Balance">$0.00</div>

          <img src="assest/images/businessatm.jpeg" class="card-img" />
        </div>
      </div>

      <!-- CREDIT CARD SECTION -->

      <h2 class="credit-title">Credit Cards</h2>

      <div class="credit-section">
        <p class="no-credit">You have no credit card at the moment.</p>

        <a href="creditcard.html" class="credit-btn"> Request Credit Card </a>
      </div>

      <!-- BACK BUTTON -->

      <div class="back-section">
        <a href="dashboard.html" class="back-btn"> Back to Dashboard </a>
      </div>
    </div>

    <script src="assest/js/cards.js"></script>
  </body>
</html>
