<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | International Credit Union</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #0d1117;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .admin-login-card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 16px;
        padding: 48px 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 16px 70px rgba(0, 0, 0, 0.45);
      }
      .admin-login-card .logo {
        text-align: center;
        margin-bottom: 32px;
      }
      .admin-login-card .logo img {
        height: 50px;
        border-radius: 8px;
        margin-bottom: 14px;
      }
      .admin-login-card .logo h2 {
        color: #f0f6fc;
        font-size: 1.25rem;
        font-weight: 600;
      }
      .admin-login-card .logo p {
        color: #8b949e;
        font-size: 0.85rem;
        margin-top: 4px;
      }
      .admin-login-card label {
        display: block;
        color: #c9d1d9;
        font-size: 0.85rem;
        margin-bottom: 6px;
        font-weight: 500;
      }
      .admin-login-card input {
        width: 100%;
        padding: 11px 14px;
        margin-bottom: 20px;
        border: 1px solid #30363d;
        border-radius: 8px;
        background: #0d1117;
        color: #f0f6fc;
        font-size: 0.92rem;
        font-family: "Inter", sans-serif;
        outline: none;
        transition: border 0.2s;
      }
      .admin-login-card input:focus {
        border-color: #58a6ff;
      }
      .admin-login-card .login-btn {
        width: 100%;
        padding: 12px;
        background: #238636;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        transition: background 0.2s;
      }
      .admin-login-card .login-btn:hover {
        background: #2ea043;
      }
      #adminError {
        color: #f85149;
        font-size: 0.82rem;
        text-align: center;
        margin-bottom: 14px;
        display: none;
      }
      .back-link {
        display: block;
        text-align: center;
        margin-top: 22px;
        color: #58a6ff;
        font-size: 0.84rem;
        text-decoration: none;
      }
      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="admin-login-card">
      <div class="logo">
        <img src="assest/images/logo.jpeg" alt="ICU Logo" />
        <h2>Admin Portal</h2>
        <p>International Credit Union</p>
      </div>

      <label>Admin Email</label>
      <input type="email" id="adminEmail" placeholder="admin@icu.com" />

      <label>Password</label>
      <input type="password" id="adminPassword" placeholder="••••••••" />

      <p id="adminError"></p>

      <button class="login-btn" id="adminLoginBtn">Sign In</button>

      <a href="index.html" class="back-link">← Back to main site</a>
    </div>

    <script>
      (function () {
        const ADMIN_SESSION = "icu_admin_session";
        const ADMIN_EMAIL = "admin@icu.com";
        const ADMIN_PASS = "admin123";

        /* Already logged in? */
        if (localStorage.getItem(ADMIN_SESSION)) {
          window.location.href = "admin.html";
          return;
        }

        document
          .getElementById("adminLoginBtn")
          .addEventListener("click", function () {
            const email = (document.getElementById("adminEmail").value || "")
              .trim()
              .toLowerCase();
            const pass = document.getElementById("adminPassword").value || "";
            const err = document.getElementById("adminError");

            err.style.display = "none";

            if (!email || !pass) {
              err.textContent = "Please enter both email and password.";
              err.style.display = "block";
              return;
            }

            if (email !== ADMIN_EMAIL || pass !== ADMIN_PASS) {
              err.textContent = "Invalid admin credentials.";
              err.style.display = "block";
              return;
            }

            localStorage.setItem(
              ADMIN_SESSION,
              JSON.stringify({ email: ADMIN_EMAIL, role: "admin" }),
            );
            window.location.href = "admin.html";
          });

        /* Enter key */
        document
          .getElementById("adminPassword")
          .addEventListener("keydown", function (e) {
            if (e.key === "Enter")
              document.getElementById("adminLoginBtn").click();
          });
      })();
    </script>
  </body>
</html>
